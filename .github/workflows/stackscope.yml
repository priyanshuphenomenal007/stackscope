name: StackScope CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Validate the reusable local GitHub Action
      - name: Run StackScope Analysis
        id: stackscope
        continue-on-error: true

        uses: ./.github/actions/stackscope

        with:
          elf: fixtures/cortex_m_target/target.elf
          entry: main
          budget: 100
          format: sarif

      - name: Verify SARIF file exists
        run: |
          ls -lah
          test -f stackscope-result.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: stackscope-result.sarif

      - name: Enforce Policy Exit Code
        if: steps.stackscope.outcome == 'failure'

        run: |
          echo "❌ StackScope policy violation detected."
          exit 1