name: StackScope CI

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build StackScope Docker image
        run: |
          docker build \
            -t stackscope-action \
            . \
            -f .github/actions/stackscope/Dockerfile

      - name: Run StackScope analysis
        id: stackscope
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            stackscope-action \
            fixtures/cortex_m_target/target.elf \
            main \
            100 \
            sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4

        with:
          name: stackscope-sarif
          path: stackscope-result.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4

        with:
          sarif_file: stackscope-result.sarif

      - name: Enforce policy result
        if: steps.stackscope.outcome == 'failure'
        run: |
          echo "StackScope policy violation detected."
          exit 1