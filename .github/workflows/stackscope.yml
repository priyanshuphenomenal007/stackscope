name: StackScope CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build StackScope Docker Image
        run: |
          docker build \
            -t stackscope-action \
            . \
            -f .github/actions/stackscope/Dockerfile

      - name: Run StackScope Analysis
        id: stackscope
        continue-on-error: true

        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            stackscope-action \
            fixtures/cortex_m_target/target.elf \
            main \
            100 \
            sarif

      - name: Verify SARIF output exists
        run: |
          ls -lah
          test -f stackscope-result.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4

        with:
          sarif_file: stackscope-result.sarif

      - name: Enforce Policy Exit Code
        if: steps.stackscope.outcome == 'failure'

        run: |
          echo "❌ StackScope policy violation detected."
          exit 1